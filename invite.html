<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Invite Friends</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="responsive.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="image2.png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #a0a0a0;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-text {
            font-size: 10px;
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 600;
        }

        .notification-icon {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-icon:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .notification-icon span {
            font-size: 20px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: #dc3545;
            border-radius: 50%;
            font-size: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Referral Card */
        .referral-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 25px;
            padding: 30px;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .referral-card::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -50px;
            right: -50px;
        }

        .referral-card::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -30px;
            left: -30px;
        }

        .referral-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            z-index: 1;
            position: relative;
        }

        .referral-subtitle {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 20px;
            z-index: 1;
            position: relative;
        }

        .referral-link-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            z-index: 1;
            position: relative;
        }

        .referral-link {
            font-size: 14px;
            word-break: break-all;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .referral-actions {
            display: flex;
            gap: 10px;
            z-index: 1;
            position: relative;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }

        .share-btn {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.4);
        }

        /* Team Section */
        .team-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .team-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .team-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .team-count {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .team-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .team-member {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .team-member:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .member-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .member-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .member-details {
            display: flex;
            flex-direction: column;
        }

        .member-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .member-country {
            font-size: 12px;
            color: #6c757d;
        }

        .member-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .member-balance {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .member-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-mining {
            background: #d4edda;
            color: #155724;
        }

        .status-not-mining {
            background: #f8d7da;
            color: #721c24;
        }

        .notify-btn {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .notify-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-text {
            font-size: 14px;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .notification-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px !important;
            }

            .nav-text {
                display: block !important;
                font-size: 8px !important;
            }

            .main-content {
                padding: 20px !important;
            }

            .referral-actions {
                flex-direction: column !important;
            }

            .team-member {
                flex-direction: column !important;
                gap: 15px !important;
                align-items: flex-start !important;
            }

            .member-stats {
                align-items: flex-start !important;
            }
        }
        
        @media (max-width: 480px) {
            body {
                flex-direction: column !important;
            }
            
            .sidebar {
                width: 100% !important;
                flex-direction: row !important;
                padding: 10px 0 !important;
                gap: 15px !important;
                justify-content: center !important;
            }
            
            .logo {
                width: 40px !important;
                height: 40px !important;
                margin-bottom: 0 !important;
            }
            
            .nav-item {
                padding: 8px !important;
            }
            
            .nav-icon {
                font-size: 20px !important;
            }
            
            .main-content {
                padding: 15px !important;
            }
            
            .page-title {
                font-size: 22px !important;
            }
            
            .referral-card {
                padding: 20px !important;
                border-radius: 20px !important;
            }
            
            .referral-title {
                font-size: 18px !important;
            }
            
            .referral-subtitle {
                font-size: 13px !important;
            }
            
            .referral-link-container {
                padding: 12px !important;
                border-radius: 10px !important;
            }
            
            .referral-link {
                font-size: 12px !important;
                word-break: break-all !important;
            }
            
            .action-btn {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .team-section {
                padding: 20px !important;
                border-radius: 20px !important;
            }
            
            .team-title {
                font-size: 18px !important;
            }
            
            .team-count {
                font-size: 13px !important;
            }
            
            .team-member {
                padding: 12px !important;
            }
            
            .member-avatar {
                width: 40px !important;
                height: 40px !important;
                font-size: 18px !important;
            }
            
            .member-name {
                font-size: 14px !important;
            }
            
            .member-username {
                font-size: 12px !important;
            }
            
            .member-stat {
                font-size: 12px !important;
            }
            
            .notification {
                top: 10px !important;
                right: 10px !important;
                left: 10px !important;
                padding: 12px 16px !important;
            }
        }
        
        @media (max-width: 375px) {
            .sidebar {
                gap: 10px !important;
                padding: 8px 0 !important;
            }
            
            .logo {
                width: 35px !important;
                height: 35px !important;
            }
            
            .nav-icon {
                font-size: 18px !important;
            }
            
            .main-content {
                padding: 12px !important;
            }
            
            .page-title {
                font-size: 20px !important;
            }
            
            .referral-card {
                padding: 15px !important;
                border-radius: 15px !important;
            }
            
            .referral-title {
                font-size: 16px !important;
            }
            
            .referral-subtitle {
                font-size: 12px !important;
            }
            
            .referral-link-container {
                padding: 10px !important;
                border-radius: 8px !important;
            }
            
            .referral-link {
                font-size: 11px !important;
            }
            
            .action-btn {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .team-section {
                padding: 15px !important;
                border-radius: 15px !important;
            }
            
            .team-title {
                font-size: 16px !important;
            }
            
            .team-count {
                font-size: 12px !important;
            }
            
            .team-member {
                padding: 10px !important;
            }
            
            .member-avatar {
                width: 35px !important;
                height: 35px !important;
                font-size: 16px !important;
            }
            
            .member-name {
                font-size: 13px !important;
            }
            
            .member-username {
                font-size: 11px !important;
            }
            
            .member-stat {
                font-size: 11px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <img src="image.png" alt="Nexora Logo" class="logo">
        
        <a href="home.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Home</span>
        </a>
        
        <a href="invite.html" class="nav-item active">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Invite</span>
        </a>
        
        <a href="wallet.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span class="nav-text">Wallet</span>
        </a>
        
        <a href="profile.html" class="nav-item">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profile</span>
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <h1 class="page-title">Invite Friends</h1>
        </div>

        <!-- Referral Card -->
        <div class="referral-card">
            <h2 class="referral-title">Your Referral Link</h2>
            <p class="referral-subtitle">Share this link with friends and earn rewards when they join!</p>
            
            <div class="referral-link-container">
                <div class="referral-link" id="referralLink">https://nexora.com/ref/USER123456</div>
            </div>
            
            <div class="referral-actions">
                <button class="action-btn copy-btn" onclick="copyLink()">
                    <span>📋</span> Copy Link
                </button>
                <button class="action-btn share-btn" onclick="shareLink()">
                    <span>📤</span> Share
                </button>
            </div>
        </div>

        <!-- Team Section -->
        <div class="team-section">
            <div class="team-header">
                <h2 class="team-title">My Team</h2>
                <span class="team-count" id="teamCount">0 Members</span>
            </div>
            
            <div class="team-list" id="teamList">
                <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div class="empty-text">No team members yet. Share your referral link to invite friends!</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notification-icon">✓</div>
        <span class="notification-text">Link Copied Successfully</span>
    </div>

    <script>
        // Sample team data (in real app, this would come from backend)
        let teamMembers = [
            {
                id: 1,
                name: "John Doe",
                country: "United States",
                balance: 450,
                isMining: true,
                lastActive: "2 minutes ago"
            },
            {
                id: 2,
                name: "Sarah Smith",
                country: "United Kingdom",
                balance: 320,
                isMining: false,
                lastActive: "1 hour ago"
            },
            {
                id: 3,
                name: "Mike Johnson",
                country: "Canada",
                balance: 580,
                isMining: true,
                lastActive: "5 minutes ago"
            },
            {
                id: 4,
                name: "Emma Wilson",
                country: "Australia",
                balance: 210,
                isMining: false,
                lastActive: "3 hours ago"
            }
        ];

        // Load team members from localStorage
        function loadTeamMembers() {
            const savedMembers = localStorage.getItem('nexoraTeamMembers');
            if (savedMembers) {
                teamMembers = JSON.parse(savedMembers);
            }
            renderTeamMembers();
        }

        // Save team members to localStorage
        function saveTeamMembers() {
            localStorage.setItem('nexoraTeamMembers', JSON.stringify(teamMembers));
        }

        // Render team members
        function renderTeamMembers() {
            const teamList = document.getElementById('teamList');
            const teamCount = document.getElementById('teamCount');
            
            teamCount.textContent = `${teamMembers.length} Members`;
            
            if (teamMembers.length === 0) {
                teamList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div class="empty-text">No team members yet. Share your referral link to invite friends!</div>
                    </div>
                `;
                return;
            }
            
            teamList.innerHTML = teamMembers.map(member => `
                <div class="team-member">
                    <div class="member-info">
                        <div class="member-avatar">${member.name.charAt(0)}</div>
                        <div class="member-details">
                            <div class="member-name">${member.name}</div>
                            <div class="member-country">${member.country}</div>
                        </div>
                    </div>
                    <div class="member-stats">
                        <div class="member-balance">${member.balance} NRC</div>
                        <div class="member-status ${member.isMining ? 'status-mining' : 'status-not-mining'}">
                            ${member.isMining ? '⛏️ Mining' : '⏸️ Not Mining'}
                        </div>
                    </div>
                    ${!member.isMining ? `
                        <button class="notify-btn" onclick="notifyMember(${member.id})" title="Send notification to start mining">
                            🔔
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }

        // Copy referral link
        function copyLink() {
            const referralLink = document.getElementById('referralLink').textContent;
            navigator.clipboard.writeText(referralLink).then(() => {
                showNotification('Link Copied Successfully');
            });
        }

        // Share referral link
        function shareLink() {
            const referralLink = document.getElementById('referralLink').textContent;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Join Nexora',
                    text: 'Start mining cryptocurrency with Nexora! Use my referral link to get started.',
                    url: referralLink
                }).catch(() => {
                    // Fallback to copy if share fails
                    copyLink();
                });
            } else {
                // Fallback for browsers that don't support Web Share API
                copyLink();
            }
        }

        // Notify member to start mining
        function notifyMember(memberId) {
            const member = teamMembers.find(m => m.id === memberId);
            if (member) {
                showNotification(`Notification sent to ${member.name}`);
                
                // In real app, this would send a push notification or message
                // For demo, we'll simulate the member starting mining after 2 seconds
                setTimeout(() => {
                    const memberIndex = teamMembers.findIndex(m => m.id === memberId);
                    if (memberIndex !== -1) {
                        teamMembers[memberIndex].isMining = true;
                        teamMembers[memberIndex].lastActive = 'Just now';
                        saveTeamMembers();
                        renderTeamMembers();
                        showNotification(`${member.name} started mining!`);
                    }
                }, 2000);
            }
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.querySelector('.notification-text').textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Load team members on page load
        loadTeamMembers();
    </script>
    <script src="internet-check.js"></script>
</body>
</html>
