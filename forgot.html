<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="responsive.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="image2.png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-side::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            animation: float 6s ease-in-out infinite;
        }

        .left-side::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -30px;
            right: -30px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            animation: logoPulse 2s ease-in-out infinite;
            border-radius: 20px;
            object-fit: cover;
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .welcome-text {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            animation: slideInLeft 0.8s ease-out 0.2s both;
        }

        .tagline {
            color: #a0a0a0;
            font-size: 14px;
            text-align: center;
            animation: slideInLeft 0.8s ease-out 0.4s both;
            letter-spacing: 1px;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
        }

        .forgot-card {
            width: 100%;
            max-width: 350px;
            animation: slideInRight 0.8s ease-out 0.3s both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .forgot-title {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .forgot-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #495057;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            color: #495057;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #0f3460;
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #adb5bd;
        }

        .send-code-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .send-code-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .send-code-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(15, 52, 96, 0.3);
        }

        .send-code-btn:hover::before {
            left: 100%;
        }

        .send-code-btn:active {
            transform: translateY(0);
        }

        .back-to-login {
            text-align: center;
            margin-top: 25px;
            color: #6c757d;
            font-size: 14px;
        }

        .back-to-login a {
            color: #0f3460;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-to-login a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .notification-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column !important;
                width: 95% !important;
                height: auto !important;
                max-width: 100% !important;
            }

            .left-side {
                padding: 25px !important;
            }

            .right-side {
                padding: 25px !important;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                width: 100% !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }
            
            .left-side {
                padding: 20px !important;
            }
            
            .right-side {
                padding: 20px !important;
            }
            
            .welcome-text {
                font-size: 22px !important;
            }
            
            .tagline {
                font-size: 12px !important;
            }
            
            .forgot-title {
                font-size: 20px !important;
            }
            
            .forgot-subtitle {
                font-size: 13px !important;
            }
            
            .logo {
                width: 100px !important;
                height: 100px !important;
            }
            
            .input-group {
                margin-bottom: 15px !important;
            }
            
            .input-group label {
                font-size: 12px !important;
            }
            
            .input-wrapper input {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .send-code-btn {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .back-to-login {
                font-size: 13px !important;
            }
        }
        
        @media (max-width: 375px) {
            .container {
                width: 100% !important;
            }
            
            .left-side {
                padding: 15px !important;
            }
            
            .right-side {
                padding: 15px !important;
            }
            
            .welcome-text {
                font-size: 20px !important;
            }
            
            .tagline {
                font-size: 11px !important;
            }
            
            .forgot-title {
                font-size: 18px !important;
            }
            
            .forgot-subtitle {
                font-size: 12px !important;
            }
            
            .logo {
                width: 80px !important;
                height: 80px !important;
            }
            
            .input-group {
                margin-bottom: 12px !important;
            }
            
            .input-group label {
                font-size: 11px !important;
            }
            
            .input-wrapper input {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .send-code-btn {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .back-to-login {
                font-size: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side">
            <img src="image.png" alt="Nexora Logo" class="logo">
            <h1 class="welcome-text">Welcome to Nexora</h1>
            <p class="tagline">Powering the Future of Digital Wealth</p>
        </div>
        <div class="right-side">
            <div class="forgot-card">
                <h2 class="forgot-title">Forgot Password?</h2>
                <p class="forgot-subtitle">Enter your registered email address and we'll send you a code to reset your password.</p>
                
                <form id="forgotForm">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="send-code-btn">Send Code</button>
                </form>
                
                <div class="back-to-login">
                    Remember your password? <a href="index.html">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notification-icon">✓</div>
        <span class="notification-text">Code Sent Successfully</span>
    </div>

    <script>
        // Handle form submission
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (email) {
                // Show notification
                const notification = document.getElementById('notification');
                notification.classList.add('show');
                
                // Redirect to forgotverify.html after notification
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        window.location.href = 'forgotverify.html';
                    }, 300);
                }, 2000);
            }
        });

        // Add input focus animations
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
    <script src="internet-check.js"></script>
</body>
</html>
