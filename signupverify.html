<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Verify Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="responsive.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="image2.png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-side::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -50px;
            left: -50px;
            animation: float 6s ease-in-out infinite;
        }

        .left-side::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            bottom: -30px;
            right: -30px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            animation: logoPulse 2s ease-in-out infinite;
            border-radius: 20px;
            object-fit: cover;
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .welcome-text {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
            animation: slideInLeft 0.8s ease-out 0.2s both;
        }

        .tagline {
            color: #a0a0a0;
            font-size: 14px;
            text-align: center;
            animation: slideInLeft 0.8s ease-out 0.4s both;
            letter-spacing: 1px;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
        }

        .verify-card {
            width: 100%;
            max-width: 350px;
            animation: slideInRight 0.8s ease-out 0.3s both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .verify-title {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .verify-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .code-input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            color: #1a1a2e;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .code-input:focus {
            outline: none;
            border-color: #0f3460;
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.1);
            transform: scale(1.05);
        }

        .timer-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .timer {
            font-size: 18px;
            font-weight: 600;
            color: #0f3460;
            margin-bottom: 10px;
        }

        .resend-code {
            color: #6c757d;
            font-size: 14px;
        }

        .resend-code a {
            color: #0f3460;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .resend-code a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }

        .resend-code a.disabled {
            color: #adb5bd;
            pointer-events: none;
        }

        .verify-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .verify-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(15, 52, 96, 0.3);
        }

        .verify-btn:hover::before {
            left: 100%;
        }

        .verify-btn:active {
            transform: translateY(0);
        }

        .back-to-login {
            text-align: center;
            margin-top: 25px;
            color: #6c757d;
            font-size: 14px;
        }

        .back-to-login a {
            color: #0f3460;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-to-login a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .notification-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column !important;
                width: 95% !important;
                height: auto !important;
                max-width: 100% !important;
            }

            .left-side {
                padding: 25px !important;
            }

            .right-side {
                padding: 25px !important;
            }

            .code-input {
                width: 50px !important;
                height: 50px !important;
                font-size: 20px !important;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                width: 100% !important;
                border-radius: 0 !important;
                box-shadow: none !important;
            }
            
            .left-side {
                padding: 20px !important;
            }
            
            .right-side {
                padding: 20px !important;
            }
            
            .welcome-text {
                font-size: 22px !important;
            }
            
            .tagline {
                font-size: 12px !important;
            }
            
            .verify-title {
                font-size: 20px !important;
            }
            
            .verify-subtitle {
                font-size: 13px !important;
            }
            
            .logo {
                width: 100px !important;
                height: 100px !important;
            }
            
            .code-inputs {
                gap: 10px !important;
            }
            
            .code-input {
                width: 45px !important;
                height: 45px !important;
                font-size: 18px !important;
            }
            
            .timer {
                font-size: 14px !important;
            }
            
            .resend-code {
                font-size: 13px !important;
            }
            
            .verify-btn {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .back-to-login {
                font-size: 13px !important;
            }
        }
        
        @media (max-width: 375px) {
            .container {
                width: 100% !important;
            }
            
            .left-side {
                padding: 15px !important;
            }
            
            .right-side {
                padding: 15px !important;
            }
            
            .welcome-text {
                font-size: 20px !important;
            }
            
            .tagline {
                font-size: 11px !important;
            }
            
            .verify-title {
                font-size: 18px !important;
            }
            
            .verify-subtitle {
                font-size: 12px !important;
            }
            
            .logo {
                width: 80px !important;
                height: 80px !important;
            }
            
            .code-inputs {
                gap: 8px !important;
            }
            
            .code-input {
                width: 40px !important;
                height: 40px !important;
                font-size: 16px !important;
            }
            
            .timer {
                font-size: 12px !important;
            }
            
            .resend-code {
                font-size: 12px !important;
            }
            
            .verify-btn {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .back-to-login {
                font-size: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side">
            <img src="image.png" alt="Nexora Logo" class="logo">
            <h1 class="welcome-text">Welcome to Nexora</h1>
            <p class="tagline">Powering the Future of Digital Wealth</p>
        </div>
        <div class="right-side">
            <div class="verify-card">
                <h2 class="verify-title">Verify Your Account</h2>
                <p class="verify-subtitle">Enter the 4-digit code sent to your email address to complete registration.</p>
                
                <form id="verifyForm">
                    <div class="code-inputs">
                        <input type="text" class="code-input" maxlength="1" id="code1" required>
                        <input type="text" class="code-input" maxlength="1" id="code2" required>
                        <input type="text" class="code-input" maxlength="1" id="code3" required>
                        <input type="text" class="code-input" maxlength="1" id="code4" required>
                    </div>
                    
                    <div class="timer-section">
                        <div class="timer" id="timer">01:00</div>
                        <div class="resend-code">
                            Didn't receive code? <a href="#" id="resendLink" class="disabled">Resend Code</a>
                        </div>
                    </div>
                    
                    <button type="submit" class="verify-btn">Verify</button>
                </form>
                
                <div class="back-to-login">
                    <a href="signup.html">Back to Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notification-icon">✓</div>
        <span class="notification-text">Account Created Successfully</span>
    </div>

    <script>
        // Timer functionality
        let timeLeft = 60;
        const timerElement = document.getElementById('timer');
        const resendLink = document.getElementById('resendLink');
        
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            } else {
                resendLink.classList.remove('disabled');
                timerElement.textContent = 'Code Expired';
                timerElement.style.color = '#dc3545';
            }
        }
        
        updateTimer();
        
        // Resend code functionality
        resendLink.addEventListener('click', function(e) {
            e.preventDefault();
            if (!this.classList.contains('disabled')) {
                timeLeft = 60;
                timerElement.style.color = '#0f3460';
                this.classList.add('disabled');
                updateTimer();
                
                // Show notification
                const notification = document.getElementById('notification');
                notification.querySelector('.notification-text').textContent = 'Code Resent Successfully';
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            }
        });
        
        // Auto-focus to next input
        const codeInputs = document.querySelectorAll('.code-input');
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < codeInputs.length - 1) {
                    codeInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
        });
        
        // Handle form submission
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const code1 = document.getElementById('code1').value;
            const code2 = document.getElementById('code2').value;
            const code3 = document.getElementById('code3').value;
            const code4 = document.getElementById('code4').value;
            
            if (code1 && code2 && code3 && code4) {
                // Show notification
                const notification = document.getElementById('notification');
                notification.querySelector('.notification-text').textContent = 'Account Created Successfully';
                notification.classList.add('show');
                
                // Redirect to home.html after notification
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 300);
                }, 2000);
            }
        });
    </script>
    <script src="internet-check.js"></script>
</body>
</html>
