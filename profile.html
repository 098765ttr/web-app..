<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="responsive.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="image2.png" sizes="32x32">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #a0a0a0;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-text {
            font-size: 10px;
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 600;
        }

        .notification-icon {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .notification-icon:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .notification-icon span {
            font-size: 20px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: #dc3545;
            border-radius: 50%;
            font-size: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .profile-info h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 14px;
            color: #6c757d;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #495057;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            color: #495057;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: #0f3460;
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.1);
        }

        .input-wrapper input:disabled {
            background: #e9ecef;
            cursor: not-allowed;
        }

        .input-wrapper input::placeholder {
            color: #adb5bd;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .save-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(15, 52, 96, 0.3);
        }

        .save-btn:hover::before {
            left: 100%;
        }

        .save-btn:active {
            transform: translateY(0);
        }

        /* Options Section */
        .options-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .option-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-item:last-child {
            border-bottom: none;
        }

        .option-item:hover {
            background: #f8f9fa;
            border-radius: 10px;
        }

        .option-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .option-details h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 3px;
        }

        .option-details p {
            font-size: 12px;
            color: #6c757d;
        }

        .option-arrow {
            font-size: 18px;
            color: #6c757d;
        }

        .logout-item {
            margin-top: 10px;
        }

        .logout-item .option-icon {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        /* Logout Modal */
        .logout-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .logout-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .logout-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .logout-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
        }

        .logout-title {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .logout-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .logout-actions {
            display: flex;
            gap: 15px;
        }

        .logout-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .yes-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .yes-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
        }

        .no-btn {
            background: #e9ecef;
            color: #495057;
        }

        .no-btn:hover {
            background: #dee2e6;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-icon {
            width: 24px;
            height: 24px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .notification-text {
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px !important;
            }

            .nav-text {
                display: block !important;
                font-size: 8px !important;
            }

            .main-content {
                padding: 20px !important;
            }

            .profile-header {
                flex-direction: column !important;
                text-align: center;
            }

            .logout-actions {
                flex-direction: column !important;
            }
        }
        
        @media (max-width: 480px) {
            body {
                flex-direction: column !important;
            }
            
            .sidebar {
                width: 100% !important;
                flex-direction: row !important;
                padding: 10px 0 !important;
                gap: 15px !important;
                justify-content: center !important;
            }
            
            .logo {
                width: 40px !important;
                height: 40px !important;
                margin-bottom: 0 !important;
            }
            
            .nav-item {
                padding: 8px !important;
            }
            
            .nav-icon {
                font-size: 20px !important;
            }
            
            .main-content {
                padding: 15px !important;
            }
            
            .page-title {
                font-size: 22px !important;
            }
            
            .profile-card {
                padding: 20px !important;
                border-radius: 20px !important;
            }
            
            .profile-avatar {
                width: 80px !important;
                height: 80px !important;
                font-size: 40px !important;
            }
            
            .profile-info h2 {
                font-size: 20px !important;
            }
            
            .profile-info p {
                font-size: 14px !important;
            }
            
            .input-group {
                margin-bottom: 15px !important;
            }
            
            .input-group label {
                font-size: 12px !important;
            }
            
            .input-wrapper input {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .save-btn {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .logout-btn {
                padding: 12px !important;
                font-size: 14px !important;
            }
            
            .notification {
                top: 10px !important;
                right: 10px !important;
                left: 10px !important;
                padding: 12px 16px !important;
            }
        }
        
        @media (max-width: 375px) {
            .sidebar {
                gap: 10px !important;
                padding: 8px 0 !important;
            }
            
            .logo {
                width: 35px !important;
                height: 35px !important;
            }
            
            .nav-icon {
                font-size: 18px !important;
            }
            
            .main-content {
                padding: 12px !important;
            }
            
            .page-title {
                font-size: 20px !important;
            }
            
            .profile-card {
                padding: 15px !important;
                border-radius: 15px !important;
            }
            
            .profile-avatar {
                width: 70px !important;
                height: 70px !important;
                font-size: 35px !important;
            }
            
            .profile-info h2 {
                font-size: 18px !important;
            }
            
            .profile-info p {
                font-size: 12px !important;
            }
            
            .input-group {
                margin-bottom: 12px !important;
            }
            
            .input-group label {
                font-size: 11px !important;
            }
            
            .input-wrapper input {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .save-btn {
                padding: 10px !important;
                font-size: 13px !important;
            }
            
            .logout-btn {
                padding: 10px !important;
                font-size: 13px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <img src="image.png" alt="Nexora Logo" class="logo">
        
        <a href="home.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Home</span>
        </a>
        
        <a href="invite.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span class="nav-text">Invite</span>
        </a>
        
        <a href="wallet.html" class="nav-item">
            <span class="nav-icon">💰</span>
            <span class="nav-text">Wallet</span>
        </a>
        
        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profile</span>
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <h1 class="page-title">Profile</h1>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-info">
                    <h2 id="displayName">John Doe</h2>
                    <p id="displayUsername">@johndoe</p>
                </div>
            </div>
            
            <form id="profileForm">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="fullName" placeholder="Enter your name" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Choose username" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Enter email" disabled>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="country">Country</label>
                    <div class="input-wrapper">
                        <select id="country" required>
                            <option value="">Select Country</option>
                            <option value="United States">United States</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            <option value="Germany">Germany</option>
                            <option value="France">France</option>
                            <option value="India">India</option>
                            <option value="Pakistan">Pakistan</option>
                            <option value="China">China</option>
                            <option value="Japan">Japan</option>
                        </select>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="province">Province</label>
                    <div class="input-wrapper">
                        <input type="text" id="province" placeholder="Enter province" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="city">City</label>
                    <div class="input-wrapper">
                        <input type="text" id="city" placeholder="Enter city" required>
                    </div>
                </div>
                
                <button type="submit" class="save-btn">Save Profile</button>
            </form>
        </div>

        <!-- Options Section -->
        <div class="options-section">
            <a href="kyc.html" class="option-item">
                <div class="option-info">
                    <div class="option-icon">🪪</div>
                    <div class="option-details">
                        <h3>KYC Verification</h3>
                        <p>Verify your identity to unlock all features</p>
                    </div>
                </div>
                <span class="option-arrow">→</span>
            </a>
            
            <div class="option-item logout-item" onclick="showLogoutModal()">
                <div class="option-info">
                    <div class="option-icon">🚪</div>
                    <div class="option-details">
                        <h3>Logout</h3>
                        <p>Sign out from your account</p>
                    </div>
                </div>
                <span class="option-arrow">→</span>
            </div>
        </div>
    </div>

    <!-- Logout Modal -->
    <div class="logout-modal" id="logoutModal">
        <div class="logout-content">
            <div class="logout-icon">🚪</div>
            <h3 class="logout-title">Logout?</h3>
            <p class="logout-subtitle">Are you sure you want to logout from your account?</p>
            <div class="logout-actions">
                <button class="logout-btn yes-btn" onclick="logout()">Yes</button>
                <button class="logout-btn no-btn" onclick="closeLogoutModal()">No</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notification-icon">✓</div>
        <span class="notification-text">Profile Saved Successfully</span>
    </div>

    <script>
        // Load profile data from localStorage
        function loadProfileData() {
            const savedProfile = localStorage.getItem('nexoraProfile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                document.getElementById('fullName').value = profile.fullName || '';
                document.getElementById('username').value = profile.username || '';
                document.getElementById('email').value = profile.email || '';
                document.getElementById('country').value = profile.country || '';
                document.getElementById('province').value = profile.province || '';
                document.getElementById('city').value = profile.city || '';
                
                // Update display
                document.getElementById('displayName').textContent = profile.fullName || 'John Doe';
                document.getElementById('displayUsername').textContent = '@' + (profile.username || 'johndoe');
            } else {
                // Set default values
                document.getElementById('fullName').value = 'John Doe';
                document.getElementById('username').value = 'johndoe';
                document.getElementById('email').value = 'john@example.com';
                document.getElementById('country').value = 'United States';
                document.getElementById('province').value = 'California';
                document.getElementById('city').value = 'Los Angeles';
            }
        }

        // Save profile data to localStorage
        function saveProfileData(profile) {
            localStorage.setItem('nexoraProfile', JSON.stringify(profile));
        }

        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const profile = {
                fullName: document.getElementById('fullName').value,
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                country: document.getElementById('country').value,
                province: document.getElementById('province').value,
                city: document.getElementById('city').value
            };
            
            // Save profile
            saveProfileData(profile);
            
            // Update display
            document.getElementById('displayName').textContent = profile.fullName;
            document.getElementById('displayUsername').textContent = '@' + profile.username;
            
            // Show notification
            showNotification('Profile Saved Successfully');
        });

        // Show logout modal
        function showLogoutModal() {
            document.getElementById('logoutModal').classList.add('show');
        }

        // Close logout modal
        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.remove('show');
        }

        // Logout function
        function logout() {
            // Show notification
            showNotification('Logged Out Successfully');
            
            // Redirect to login page after notification
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.querySelector('.notification-text').textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Load profile data on page load
        loadProfileData();
    </script>
    <script src="internet-check.js"></script>
</body>
</html>
